<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Elder’s Tower</title>

<style>

img {
max-width:100%;
height:auto;
}

html {

font-size:clamp(12px, 1vw, 22px);

}

body {

min-height:100vh;
overflow-x:hidden;

}

.rodape {

position:relative;
margin-top:0vh;
width:100%;

font-size:0.8vw;
color:#8a6b2f;

opacity:0.7;
letter-spacing:1px;

}

body {

/* vinheta dourada fantasy */

background:
radial-gradient(circle at center,
rgba(0,0,0,0) 80%,
rgba(214,184,124,0.08) 85%,
rgba(214,184,124,0.25) 100%),
black;

color:#d6b87c;
font-family:Georgia, serif;

margin:0;
text-align:center;

padding-top:30px;

}


/* LOGO */

.logo {

margin-top:3vh;
width:15vw;

}


/* FRASE */

.frase {

margin-top:2vh;
font-size:1vw;
max-width:42vw;
margin-left:auto;
margin-right:auto;

}


/* CHOOSE */

.choose {

margin-top:4vh;
font-size:1.7vw;

}


/* SETAS */

.setas {

display:flex;
justify-content:center;
gap:1.5vw;
margin-top:1vh;

}

.setas img {

width:3.6vw;

}


/* PERGAMINHOS */

.pergaminhos {

display:flex;
justify-content:center;
gap:1vh;
margin-top:0vw;
flex-wrap:wrap;

}

.pergaminho {

position:relative;
width:22vw;
cursor:pointer;
transition:transform 0.35s ease;

}

.pergaminho:hover {

transform:scale(1.12);

}

.pergaminho img {

width:100%;

}


/* LIVRO */

.livro {

position:absolute;

right:26vw;   /* antes 500px */
top:6.5vh;     /* antes 80px */

width:10.4vw; /* antes 200px */

}


/* LINKS SOBRE LIVRO */

.linksLivroEsquerda {

position:absolute;

top:9vh;
right:36.2vw;

font-size:0.85vw;
font-family:Georgia, serif;
color:#4a2c00;

}

.linksLivroDireita {

position:absolute;

top:9vh;
right:31vw;

font-size:0.85vw;
font-family:Georgia, serif;
color:#4a2c00;

}

.linksLivroEsquerda a,
.linksLivroDireita a {

display:block;
margin:10px 0;
text-decoration:none;
color:#4a2c00;

/* animação suave */
transition:transform 0.2s ease, color 0.2s ease;

}


.linksLivroEsquerda a:hover,
.linksLivroDireita a:hover {

color:#c89b3c;

/* cresce 10% */
transform:scale(1.1);

}

</style>

</head>


<body>


<!-- LIVRO -->

<img class="livro" src="imagens/LivroLinks.png">

</div>

<img class="logo" src="imagens/LogoTransparente.png">



<!-- FRASE -->

</div>
