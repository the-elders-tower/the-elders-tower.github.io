<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Elder’s Tower</title>

<style>

/* RESET SUAVE */

* {

box-sizing:border-box;

}


img {

max-width:100%;
height:auto;

}


/* TIPOGRAFIA GLOBAL RESPONSIVA */

html {

font-size:clamp(12px, 1vw, 22px);

}


body {

min-height:100vh;
overflow-x:hidden;

/* vinheta dourada fantasy */

background:
radial-gradient(circle at center,
rgba(0,0,0,0) 80%,
rgba(214,184,124,0.08) 85%,
rgba(214,184,124,0.25) 100%),
black;

color:#d6b87c;
font-family:Georgia, serif;

margin:0;
text-align:center;

padding-top:30px;

}


/* RODAPÉ */

.rodape {

position:relative;
width:100%;

font-size:0.8vw;

color:#8a6b2f;

opacity:0.7;
letter-spacing:1px;

margin-top:2vh;

}


/* LOGO */

.logo {

margin-top:3vh;
width:15vw;

}


/* FRASE */

.frase {

margin-top:2vh;

font-size:1vw;

max-width:42vw;

margin-left:auto;
margin-right:auto;

line-height:1.5;

}


/* CHOOSE */

.choose {

margin-top:4vh;

font-size:1.7vw;

letter-spacing:1px;

}


/* SETAS */

.setas {

display:flex;

justify-content:center;

gap:1.5vw;

margin-top:1vh;

}


.setas img {

width:3.6vw;

}


/* PERGAMINHOS */

.pergaminhos {

display:flex;

justify-content:center;

gap:1vh;

flex-wrap:wrap;

margin-top:0.5vh;

}


.pergaminho {

position:relative;

width:22vw;

cursor:pointer;

transition:transform 0.35s ease;

}


.pergaminho:hover {

transform:scale(1.12);

}


.pergaminho img {

width:100%;

}


/* LIVRO SOCIAL */

.livro {

position:absolute;

right:26vw;

top:6.5vh;

width:10.4vw;

}


/* LINKS SOBRE LIVRO */

.linksLivroEsquerda {

position:absolute;

top:7.5vh;

right:31.7vw;

font-size:0.85vw;

font-family:Georgia, serif;

color:#4a2c00;

}


.linksLivroDireita {

position:absolute;

top:7.5vh;

right:27vw;

font-size:0.85vw;

font-family:Georgia, serif;

color:#4a2c00;

}


/* LINKS INTERAÇÃO */

.linksLivroEsquerda a,
.linksLivroDireita a {

display:block;

margin:10px 0;

text-decoration:none;

color:#4a2c00;

transition:transform 0.2s ease, color 0.2s ease;

}


.linksLivroEsquerda a:hover,
.linksLivroDireita a:hover {

color:#c89b3c;

transform:scale(1.1);

}


/* ===================== */
/* MOBILE POLISH FINAL */
/* ===================== */

@media (max-width:768px) {


.logo {

width:45vw;

}


.frase {

font-size:4vw;

max-width:80vw;

}


.choose {

font-size:6vw;

margin-top:5vh;

}


.setas img {

width:14vw;

}


.pergaminhos {

flex-direction:row;

gap:4vw;

}

.pergaminho {

width:40vw;

}


.rodape {

font-size:3vw;

margin-top:5vh;

}


/* LIVRO SOCIAL MOBILE */

.livro {

position:relative;

right:auto;

top:auto;

width:40vw;

margin-top:25px;

}


/* LINKS MOBILE */

.linksLivroEsquerda,
.linksLivroDireita {

position:absolute;

top:14vw;

font-size:4vw;

display:flex;

flex-direction:column;

gap:4vw;

}

.linksLivroEsquerda {

left:28%;

}

.linksLivroDireita {

right:28%;

}


.linksLivroEsquerda {

margin-bottom:10px;

}

}

</style>

</head>
